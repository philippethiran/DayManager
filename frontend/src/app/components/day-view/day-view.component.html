<main class="day-view">
  <header class="day-view__header">
    <h1>DayManager</h1>
    <p class="day-view__subtitle">Manual tasks — title and date</p>
  </header>

  <section class="day-view__add">
    <h2>Add task</h2>
    <form (ngSubmit)="addTask()">
      <label>
        Title
        <input
          type="text"
          name="title"
          [(ngModel)]="newTitle"
          [disabled]="saving"
          required
        />
      </label>
      <label>
        Date
        <input
          type="date"
          name="taskDate"
          [(ngModel)]="newTaskDate"
          [disabled]="saving"
          required
        />
      </label>
      <button type="submit" [disabled]="saving || !newTitle.trim()">
        {{ saving ? 'Adding…' : 'Add task' }}
      </button>
    </form>
  </section>

  <p *ngIf="errorMessage" class="day-view__error" role="alert">
    {{ errorMessage }}
  </p>

  <p *ngIf="loading" class="day-view__loading">Loading tasks…</p>

  <section *ngIf="!loading" class="day-view__section day-view__section--today">
    <h2>Today</h2>
    <p class="day-view__section-date">{{ formattedToday }}</p>
    <p *ngIf="todayTasks.length === 0" class="day-view__empty">No tasks for today.</p>
    <ul *ngIf="todayTasks.length > 0">
      <li *ngFor="let task of todayTasks">
        <span class="task-row__title">{{ task.title }}</span>
        <button type="button" class="task-row__delete" (click)="removeTask(task)">
          Delete
        </button>
      </li>
    </ul>
  </section>

  <section *ngIf="!loading" class="day-view__section day-view__section--future">
    <h2>Future</h2>
    <p *ngIf="futureTasks.length === 0" class="day-view__empty">No upcoming tasks.</p>
    <div *ngFor="let group of futureGroups" class="day-view__future-group">
      <h3 class="day-view__future-date">{{ group.label }}</h3>
      <ul>
        <li *ngFor="let task of group.tasks">
          <span class="task-row__title">{{ task.title }}</span>
          <button type="button" class="task-row__delete" (click)="removeTask(task)">
            Delete
          </button>
        </li>
      </ul>
    </div>
  </section>
</main>
