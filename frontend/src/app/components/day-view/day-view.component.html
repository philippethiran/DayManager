<main class="day-view">
  <header class="day-view__header">
    <h1>DayManager</h1>
    <p class="day-view__date">{{ formattedSelectedDate }}</p>
    <div class="day-view__nav">
      <button type="button" (click)="shiftDay(-1)">Previous day</button>
      <button type="button" (click)="goToToday()">Today</button>
      <button type="button" (click)="shiftDay(1)">Next day</button>
    </div>
  </header>

  <section class="day-view__add">
    <h2>Add task</h2>
    <form (ngSubmit)="addTask()">
      <label>
        Title
        <input
          type="text"
          name="title"
          [(ngModel)]="newTitle"
          [disabled]="saving"
          required
        />
      </label>
      <label>
        Time (optional)
        <input type="time" name="time" [(ngModel)]="newTime" [disabled]="saving" />
      </label>
      <button type="submit" [disabled]="saving || !newTitle.trim()">
        {{ saving ? 'Adding…' : 'Add task' }}
      </button>
    </form>
  </section>

  <p *ngIf="errorMessage" class="day-view__error" role="alert">
    {{ errorMessage }}
  </p>

  <section class="day-view__list">
    <h2>Tasks</h2>
    <p *ngIf="loading">Loading tasks…</p>
    <p *ngIf="!loading && tasks.length === 0">No tasks for this day.</p>
    <ul *ngIf="!loading && tasks.length > 0">
      <li *ngFor="let task of tasks" [class.is-done]="task.is_done">
        <label class="task-row">
          <input
            type="checkbox"
            [checked]="task.is_done"
            (change)="toggleDone(task)"
          />
          <span class="task-row__title">{{ task.title }}</span>
          <span *ngIf="task.due_time" class="task-row__time">
            {{ formatDueTime(task.due_time) }}
          </span>
        </label>
        <button type="button" class="task-row__delete" (click)="removeTask(task)">
          Delete
        </button>
      </li>
    </ul>
  </section>
</main>
